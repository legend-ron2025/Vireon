<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>404 — Page Not Found | VIREON</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--bg:#0B0B0B;--gold:#D4AF37;--gold-2:#F5D76E;--gold-dark:#B8962E;--white:#fff;--text-2:#B5B5B5;--gray:#6B6B6B;--gold-grad:linear-gradient(135deg,#D4AF37,#F5D76E,#B8962E);--font-serif:'Cormorant Garamond',Georgia,serif;--font-sans:'Montserrat',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--white);font-family:var(--font-sans);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;overflow:hidden}
canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.4}
.wrap{position:relative;z-index:1;max-width:600px}
.code{font-family:var(--font-serif);font-size:clamp(6rem,20vw,12rem);font-weight:300;line-height:1;background:var(--gold-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:glow 3s ease-in-out infinite;filter:brightness(1.1)}
@keyframes glow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3) drop-shadow(0 0 20px rgba(212,175,55,.5))}}
.title{font-family:var(--font-serif);font-size:clamp(1.5rem,4vw,2.5rem);font-weight:300;color:var(--white);margin:.5rem 0 1rem}
.title em{font-style:italic;color:var(--gold)}
.desc{font-size:.85rem;color:var(--text-2);line-height:1.9;margin-bottom:3rem;max-width:420px;margin-left:auto;margin-right:auto}
.gold-line{width:60px;height:1px;background:var(--gold-grad);margin:.8rem auto 2rem}
.actions{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.btn-g{display:inline-flex;align-items:center;gap:.5rem;background:var(--gold-grad);border:none;color:var(--bg);font-family:var(--font-sans);font-size:.62rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;padding:.9rem 2rem;cursor:pointer;text-decoration:none;transition:all .3s}
.btn-g:hover{box-shadow:0 0 25px rgba(212,175,55,.5);transform:translateY(-2px)}
.btn-o{display:inline-flex;align-items:center;gap:.5rem;background:transparent;border:1px solid var(--gold);color:var(--gold);font-family:var(--font-sans);font-size:.62rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;padding:.9rem 2rem;cursor:pointer;text-decoration:none;transition:all .3s}
.btn-o:hover{background:var(--gold);color:var(--bg)}
.quick-links{margin-top:3rem;display:flex;gap:2rem;justify-content:center;flex-wrap:wrap}
.quick-links a{font-size:.7rem;color:var(--gray);letter-spacing:.1em;text-transform:uppercase;text-decoration:none;transition:color .3s}
.quick-links a:hover{color:var(--gold)}
.eyebrow{font-size:.6rem;font-weight:600;letter-spacing:.38em;color:var(--gold);text-transform:uppercase;margin-bottom:.5rem}
</style>
<link rel="stylesheet" href="css/logo.css"></head>
<body>
<canvas id="c"></canvas>
<div class="wrap">
  <p class="eyebrow">VIREON LUXURY COUTURE</p>
  <div class="code">404</div>
  <h1 class="title">Page <em>Not Found</em></h1>
  <div class="gold-line"></div>
  <p class="desc">The page you're looking for has either moved or doesn't exist. Perhaps it was a limited edition — already gone.</p>
  <div class="actions">
    <a href="index.html" class="btn-g"><i class="fas fa-home"></i> BACK TO HOME</a>
    <a href="shop.html" class="btn-o"><i class="fas fa-shopping-bag"></i> EXPLORE SHOP</a>
  </div>
  <div class="quick-links">
    <a href="collections.html">Collections</a>
    <a href="shop.html?badge=NEW">New Arrivals</a>
    <a href="tracking.html">Track Order</a>
    <a href="contact.html">Contact</a>
  </div>
</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');let W,H,pts=[];
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}resize();window.addEventListener('resize',resize);
class P{constructor(){this.x=Math.random()*W;this.y=H+5;this.r=Math.random()*2+.5;this.vy=-(Math.random()*.6+.2);this.vx=(Math.random()-.5)*.3;this.op=Math.random()*.5+.1;this.life=0;this.max=Math.random()*200+100;}tick(){this.x+=this.vx;this.y+=this.vy;this.life++;}draw(){const f=this.life<20?this.life/20:this.life>this.max-20?(this.max-this.life)/20:1;ctx.save();ctx.globalAlpha=this.op*f;ctx.fillStyle='#D4AF37';ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fill();ctx.restore();}alive(){return this.life<this.max&&this.y>-5;}}
function loop(){ctx.clearRect(0,0,W,H);if(pts.length<30)pts.push(new P());pts=pts.filter(p=>{p.tick();p.draw();return p.alive();});requestAnimationFrame(loop);}loop();
</script>
<script src="js/cursor.js"></script></body>
</html>
